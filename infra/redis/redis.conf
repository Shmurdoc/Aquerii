# Redis 7.2 configuration for Aquerii
bind 0.0.0.0
protected-mode yes
port 6379

# Auth (password set via env)
# requirepass is set via command line: --requirepass $REDIS_PASSWORD

# Persistence
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no

# Memory management
maxmemory-policy allkeys-lru

# Pub/Sub for realtime
# No special config needed; default behavior is correct

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Keyspace notifications for expiry events
notify-keyspace-events "Ex"
