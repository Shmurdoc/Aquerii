receivers:
  - otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

  resource:
    attributes:
      - key: deployment.environment
        value: ${OTEL_ENV}
        action: upsert

exporters:
  # Traces → Jaeger (or any OTLP-compatible backend)
  otlp/traces:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Metrics → Prometheus scrape endpoint
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: aquerii
    send_timestamps: true

  # Logs → Loki
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    labels:
      resource:
        service.name: service_name
        service.version: service_version

  # Debug (dev only — remove in prod)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/traces]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [loki]
