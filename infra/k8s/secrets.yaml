apiVersion: v1
kind: Secret
metadata:
  name: aquerii-api-secrets
  namespace: aquerii
type: Opaque
stringData:
  # Override these values with your actual secrets (use Vault / Sealed Secrets in production)
  APP_KEY:              "base64:CHANGE_ME"
  DB_HOST:              "postgres"
  DB_PORT:              "5432"
  DB_DATABASE:          "aquerii"
  DB_USERNAME:          "aquerii_app"
  DB_PASSWORD:          "CHANGE_ME"
  REDIS_HOST:           "redis"
  REDIS_PASSWORD:       "CHANGE_ME"
  JWT_SECRET:           "CHANGE_ME"
  STRIPE_SECRET:        "CHANGE_ME"
  STRIPE_WEBHOOK_SECRET: "CHANGE_ME"
  PAYFAST_MERCHANT_ID:  "CHANGE_ME"
  PAYFAST_MERCHANT_KEY: "CHANGE_ME"
  PAYFAST_PASSPHRASE:   "CHANGE_ME"
  AWS_ACCESS_KEY_ID:    "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  AWS_DEFAULT_REGION:   "us-east-1"
  AWS_BUCKET:           "aquerii"
  AWS_ENDPOINT:         "https://minio.aquerii.app"
  AI_INTERNAL_TOKEN:    "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: aquerii-realtime-secrets
  namespace: aquerii
type: Opaque
stringData:
  JWT_SECRET:     "CHANGE_ME"
  REDIS_HOST:     "redis"
  REDIS_PASSWORD: "CHANGE_ME"
  API_BASE_URL:   "http://api"
---
apiVersion: v1
kind: Secret
metadata:
  name: aquerii-ai-secrets
  namespace: aquerii
type: Opaque
stringData:
  GEMINI_API_KEY:   "CHANGE_ME"
  ANTHROPIC_API_KEY: "CHANGE_ME"
  REDIS_HOST:       "redis"
  REDIS_PASSWORD:   "CHANGE_ME"
  INTERNAL_TOKEN:   "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: aquerii-postgres-secrets
  namespace: aquerii
type: Opaque
stringData:
  POSTGRES_USER:     "postgres"
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_DB:       "aquerii"
---
apiVersion: v1
kind: Secret
metadata:
  name: aquerii-redis-secrets
  namespace: aquerii
type: Opaque
stringData:
  REDIS_PASSWORD: "CHANGE_ME"
