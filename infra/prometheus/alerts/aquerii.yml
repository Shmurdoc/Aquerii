groups:

  # ════════════════════════════════════════════════════════════
  # API SLOs
  # ════════════════════════════════════════════════════════════
  - name: api_slo
    rules:
      - alert: APIHighErrorRate
        expr: |
          sum(rate(http_server_requests_total{job="api",status=~"5.."}[5m]))
          /
          sum(rate(http_server_requests_total{job="api"}[5m])) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API error rate > 1% for 2 minutes"
          runbook: "https://docs.aquerii.io/runbooks/api-high-error-rate"

      - alert: APIHighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_request_duration_seconds_bucket{job="api"}[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API P99 latency > 2s"

      - alert: APIDown
        expr: up{job="api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API service is down"

  # ════════════════════════════════════════════════════════════
  # Realtime
  # ════════════════════════════════════════════════════════════
  - name: realtime
    rules:
      - alert: RealtimeDown
        expr: up{job="realtime"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Realtime service is down"

      - alert: RealtimeHighConnections
        expr: aquerii_realtime_connected_clients > 8000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Realtime approaching 10k connection limit — scale horizontally"

  # ════════════════════════════════════════════════════════════
  # AI Service
  # ════════════════════════════════════════════════════════════
  - name: ai_service
    rules:
      - alert: AIServiceDown
        expr: up{job="ai"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AI service is down"

      - alert: AIHighProviderErrorRate
        expr: |
          sum(rate(aquerii_ai_provider_errors_total[5m]))
          /
          sum(rate(aquerii_ai_requests_total[5m])) > 0.05
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "AI provider error rate > 5%"

  # ════════════════════════════════════════════════════════════
  # PostgreSQL
  # ════════════════════════════════════════════════════════════
  - name: postgres
    rules:
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"

      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > 180
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections > 180 (limit 200)"

      - alert: PostgresSlowQueries
        expr: |
          rate(pg_stat_statements_mean_exec_time_seconds[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL mean query time > 1s"

      - alert: PostgresReplicationLag
        expr: pg_replication_lag > 30
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL replication lag > 30s"

  # ════════════════════════════════════════════════════════════
  # Redis
  # ════════════════════════════════════════════════════════════
  - name: redis
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory > 85%"

  # ════════════════════════════════════════════════════════════
  # Disk / Host
  # ════════════════════════════════════════════════════════════
  - name: host
    rules:
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} /
           node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk space < 15% free"

      - alert: DiskSpaceCritical
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} /
           node_filesystem_size_bytes{mountpoint="/"}) < 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space < 5% free"

      - alert: HighCPU
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage > 90% for 10 minutes"
