global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production
    app: aquerii

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # wire up Alertmanager here when added

scrape_configs:

  # ── Prometheus self ──────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # ── Laravel API (via OTel Collector Prometheus exporter) ─────
  - job_name: api
    static_configs:
      - targets: [otel-collector:8889]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: aquerii_api_.*
        action: keep

  # ── Node.js Realtime ─────────────────────────────────────────
  - job_name: realtime
    static_configs:
      - targets: [realtime:9464]

  # ── Python AI service ────────────────────────────────────────
  - job_name: ai
    static_configs:
      - targets: [ai:9090]

  # ── PostgreSQL ───────────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: [postgres:9187]   # postgres_exporter sidecar

  # ── Redis ────────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: [redis:9121]      # redis_exporter sidecar

  # ── Caddy ────────────────────────────────────────────────────
  - job_name: caddy
    static_configs:
      - targets: [caddy:2019]

  # ── Node exporter (host) ─────────────────────────────────────
  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]
