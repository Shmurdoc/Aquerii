name: aquerii

services:

  # ─── CADDY (TLS + Reverse Proxy) ──────────────────────────────
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-admin@aquerii.app}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - realtime
      - web
    networks:
      - public
      - api_net

  # ─── LARAVEL API ──────────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-aquerii}
      DB_USERNAME: ${DB_USERNAME:-aquerii_app}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILISEARCH_KEY}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_KEY: ${MINIO_KEY}
      MINIO_SECRET: ${MINIO_SECRET}
      MINIO_BUCKET: ${MINIO_BUCKET:-aquerii}
      STRIPE_KEY: ${STRIPE_KEY}
      STRIPE_SECRET: ${STRIPE_SECRET}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      PAYFAST_MERCHANT_ID: ${PAYFAST_MERCHANT_ID}
      PAYFAST_MERCHANT_KEY: ${PAYFAST_MERCHANT_KEY}
      PAYFAST_PASSPHRASE: ${PAYFAST_PASSPHRASE}
      PAYFAST_SANDBOX: ${PAYFAST_SANDBOX:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      REALTIME_SECRET: ${REALTIME_SECRET}
      AI_SERVICE_URL: http://ai:8002
      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
    volumes:
      - api_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - api_net
      - data_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── HORIZON (Queue Worker) ───────────────────────────────────
  horizon:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    command: ["php", "artisan", "horizon"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-aquerii}
      DB_USERNAME: ${DB_USERNAME:-aquerii_app}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILISEARCH_KEY}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_KEY: ${MINIO_KEY}
      MINIO_SECRET: ${MINIO_SECRET}
      MINIO_BUCKET: ${MINIO_BUCKET:-aquerii}
      STRIPE_KEY: ${STRIPE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      AI_SERVICE_URL: http://ai:8002
      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      CLICKHOUSE_HOST: clickhouse
    depends_on:
      - api
    volumes:
      - api_storage:/var/www/html/storage
    networks:
      - api_net
      - data_net

  # ─── NODE.JS REALTIME ─────────────────────────────────────────
  realtime:
    build:
      context: ./services/realtime
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${APP_KEY}
      INTERNAL_SECRET: ${REALTIME_SECRET}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_DATABASE:-aquerii}
      DB_USER: ${DB_USERNAME:-aquerii_app}
      DB_PASSWORD: ${DB_PASSWORD}
      NODE_ENV: ${APP_ENV:-development}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - api_net
      - data_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── PYTHON AI SERVICE ────────────────────────────────────────
  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8002
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      INTERNAL_SECRET: ${AI_SERVICE_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_DATABASE:-aquerii}
      DB_USER: ${DB_USERNAME:-aquerii_app}
      DB_PASSWORD: ${DB_PASSWORD}
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8003
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - api_net
      - data_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── POSTGRESQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-aquerii}
      POSTGRES_USER: ${DB_USERNAME:-aquerii_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret_app_password}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - data_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-aquerii_app} -d ${DB_DATABASE:-aquerii}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c max_connections=200
        -c wal_level=replica
        -c log_min_duration_statement=1000
        -c log_line_prefix='%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

  # ─── REDIS ────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-secret_redis_password}
        --appendonly yes
        --appendfsync everysec
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - data_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MEILISEARCH ─────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.8
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-secret_meilisearch_master_key}
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: ${APP_ENV:-development}
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - data_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ─── MINIO (Object Storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # MinIO console (dev only)
    networks:
      - data_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── CHROMADB (Vector DB for AI RAG) ─────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - chromadb_data:/chroma/chroma
    networks:
      - data_net

  # ─── CLICKHOUSE (Analytics) ───────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-aquerii_analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USERNAME:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - data_net

  # ─── MAILPIT (Dev Email) ──────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"   # Mailpit UI (dev only)
    networks:
      - api_net

  # ─── PROMETHEUS ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - data_net
      - observability_net

  # ─── GRAFANA ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - observability_net

  # ─── LOKI (Log aggregation) ───────────────────────────────────
  loki:
    image: grafana/loki:2.9.5
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - observability_net

  # ─── OTEL COLLECTOR ──────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    restart: unless-stopped
    volumes:
      - ./infra/otel/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - api_net
      - observability_net

  # ─── VAULT (Dev mode) ─────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - data_net

  # ─── WEB (React SPA) ──────────────────────────────────────────
  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-/}
    restart: unless-stopped
    networks:
      - public
      - api_net

networks:
  public:
    driver: bridge
  api_net:
    driver: bridge
    internal: false
  data_net:
    driver: bridge
    internal: true
  observability_net:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
  chromadb_data:
  clickhouse_data:
  caddy_data:
  caddy_config:
  api_storage:
  prometheus_data:
  grafana_data:
  loki_data:
