name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.3"
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

# ════════════════════════════════════════════════════════════════
# STAGE 1 — Static Analysis (runs in parallel)
# ════════════════════════════════════════════════════════════════
jobs:

  lint-php:
    name: PHP Lint & Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pgsql, redis, zip, bcmath, intl
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: services/api/vendor
          key: composer-${{ hashFiles('services/api/composer.lock') }}

      - run: composer install --prefer-dist --no-scripts --no-progress
      - run: composer lint
      - run: composer analyse

  lint-node:
    name: Node Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/realtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/realtime/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check app
      - run: mypy app --ignore-missing-imports

# ════════════════════════════════════════════════════════════════
# STAGE 2 — Unit Tests
# ════════════════════════════════════════════════════════════════

  test-php:
    name: PHP Unit Tests
    runs-on: ubuntu-latest
    needs: [lint-php]
    services:
      postgres:
        image: postgres:15.6
        env:
          POSTGRES_DB: aquerii_test
          POSTGRES_USER: aquerii_app
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pgsql, redis, zip, bcmath, intl
          coverage: pcov

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: services/api/vendor
          key: composer-${{ hashFiles('services/api/composer.lock') }}

      - run: composer install --prefer-dist --no-scripts --no-progress

      - name: Prepare test env
        run: |
          cp .env.example .env.testing
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=aquerii_test|' .env.testing
          sed -i 's|DB_USERNAME=.*|DB_USERNAME=aquerii_app|' .env.testing
          sed -i 's|DB_PASSWORD=.*|DB_PASSWORD=secret|' .env.testing
          php artisan key:generate --env=testing

      - run: composer test -- --coverage-clover coverage.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: services/api/coverage.xml
          flags: php

  test-node:
    name: Node Unit Tests
    runs-on: ubuntu-latest
    needs: [lint-node]
    defaults:
      run:
        working-directory: services/realtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/realtime/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage

  test-python:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    needs: [lint-python]
    defaults:
      run:
        working-directory: services/ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov
      - run: pytest tests/unit --cov=app --cov-report=xml

# ════════════════════════════════════════════════════════════════
# STAGE 3 — Security Scan
# ════════════════════════════════════════════════════════════════

  security:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    needs: [test-php, test-node, test-python]
    steps:
      - uses: actions/checkout@v4

      - name: PHP — composer audit
        working-directory: services/api
        run: |
          composer install --prefer-dist --no-scripts --no-progress --quiet
          composer audit

      - name: Node — npm audit
        working-directory: services/realtime
        run: |
          npm ci --quiet
          npm audit --audit-level=high

      - name: Python — pip-audit
        working-directory: services/ai
        run: |
          pip install pip-audit --quiet
          pip-audit -r requirements.txt

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

# ════════════════════════════════════════════════════════════════
# STAGE 4 — Docker Build (verify images build cleanly)
# ════════════════════════════════════════════════════════════════

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [security]
    strategy:
      matrix:
        service: [api, realtime, ai]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: aquerii/${{ matrix.service }}:ci

# ════════════════════════════════════════════════════════════════
# STAGE 5 — Integration Tests (docker-compose spin-up)
# ════════════════════════════════════════════════════════════════

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: |
          cp .env.example .env
          docker compose up -d postgres redis meilisearch
          docker compose run --rm api php artisan migrate --force --seed

      - name: Run API integration tests
        working-directory: services/api
        run: composer test -- --group=integration

      - name: Tear down
        if: always()
        run: docker compose down -v

# ════════════════════════════════════════════════════════════════
# STAGE 6 — Publish (main branch only)
# ════════════════════════════════════════════════════════════════

  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service: [api, realtime, ai]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aquerii-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/aquerii-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
